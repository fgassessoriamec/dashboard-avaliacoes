<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Avaliações de Turmas</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4f0; --surface: #ffffff; --surface2: #f0efe9;
      --border: rgba(0,0,0,0.07); --border2: rgba(0,0,0,0.13);
      --text: #1a1a18; --text2: #6b6b66; --text3: #9b9b94;
      --radius: 12px; --radius-sm: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18; --surface: #242422; --surface2: #2e2e2b;
        --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
        --text: #f0efe9; --text2: #a0a09a; --text3: #6b6b66;
      }
    }
    body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .topbar { background: var(--surface); border-bottom: 0.5px solid var(--border2); padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; gap: 12px; }
    .topbar-logo { font-size: 14px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 10px; white-space: nowrap; }
    .topbar-logo .icon { width: 28px; height: 28px; background: var(--text); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .topbar-logo .icon svg { fill: var(--bg); }
    .filters { display: flex; gap: 4px; flex-wrap: wrap; }
    .filter-btn { font-size: 12px; font-family: inherit; padding: 5px 14px; border-radius: 20px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: all .15s; white-space: nowrap; }
    .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
    .filter-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }
    .dash { max-width: 1140px; margin: 0 auto; padding: 28px 24px 60px; }
    .dash-header { margin-bottom: 24px; }
    .dash-title { font-size: 22px; font-weight: 500; }
    .dash-subtitle { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .section-label { font-size: 11px; font-weight: 500; letter-spacing: .6px; text-transform: uppercase; color: var(--text3); margin: 24px 0 10px; }
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    @media (max-width: 700px) {
      .kpi-grid { grid-template-columns: 1fr 1fr; }
      .topbar { padding: 0 14px; }
      .dash { padding: 18px 14px 50px; }
      .two-col { grid-template-columns: 1fr !important; }
    }
    .kpi { background: var(--surface2); border-radius: var(--radius-sm); padding: 16px 18px; }
    .kpi-label { font-size: 11px; color: var(--text3); letter-spacing: .3px; margin-bottom: 6px; }
    .kpi-value { font-size: 30px; font-weight: 500; font-variant-numeric: tabular-nums; line-height: 1; }
    .kpi-sub { font-size: 11px; color: var(--text3); margin-top: 5px; }
    .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 12px; }
    .card-title { font-size: 11px; font-weight: 500; letter-spacing: .4px; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .ranking-list { display: flex; flex-direction: column; gap: 5px; }
    .ranking-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--surface2); border-radius: 7px; }
    .rank-num { font-size: 11px; color: var(--text3); min-width: 16px; text-align: center; }
    .rank-name { font-size: 12px; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rank-bar-wrap { width: 56px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
    .rank-bar { height: 100%; border-radius: 2px; }
    .rank-score { font-size: 12px; font-weight: 500; font-variant-numeric: tabular-nums; min-width: 38px; text-align: right; }
    .green { color: #1D9E75; } .blue { color: #378ADD; } .orange { color: #BA7517; } .red { color: #D85A30; }
    .loading { text-align: center; padding: 80px 0; color: var(--text2); font-size: 14px; }
    .dot { display: inline-block; animation: blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100%{opacity:.15} 40%{opacity:1} }
    .no-data { text-align: center; padding: 50px; color: var(--text2); font-size: 13px; }
  </style>
</head>

<div class="topbar">
  <div class="topbar-logo">

      <svg width="14" height="14" viewBox="0 0 14 14">

    <button class="filter-btn" data-filter="ano" onclick="setFilter('ano',this)">Este ano</button>
    <button class="filter-btn" data-filter="todos" onclick="setFilter('todos',this)">Todos</button>

</div>

<div class="dash">
  <div class="dash-header">
    <div class="dash-title">Dashboard de Avaliações</div>

  </div>
  <div id="main-content">

      <div><span class="dot">●</span> <span class="dot">●</span> <span class="dot">●</span></div>
      <div style="margin-top:14px">Buscando dados atualizados...</div>
    </div>
  </div>
</div>

<script>
const NOTION_DB_ID = '3412719e-9e94-8080-8f8b-dffefb432427';
const API_URL = 'https://api.anthropic.com/v1/messages';

let allData = [];
let activeCharts = {};

/* ── Detecção do FDS mais recente ── */
function getLastWeekendRange() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const dow = today.getDay();
  let friday;
  if      (dow === 5) { friday = new Date(today); }
  else if (dow === 6) { friday = new Date(today); friday.setDate(today.getDate()-1); }
  else if (dow === 0) { friday = new Date(today); friday.setDate(today.getDate()-2); }
  else {
    // seg(1)→3, ter(2)→4, qua(3)→5, qui(4)→6
    friday = new Date(today); friday.setDate(today.getDate() - (dow + 2));
  }
  const sunday = new Date(friday);
  sunday.setDate(friday.getDate() + 2);
  sunday.setHours(23,59,59,999);
  return { start: friday, end: sunday };
}

function fmtDate(d) {
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
}

/* ── Filtros ── */
function getFilteredData(data, filter) {
  const now = new Date(); now.setHours(23,59,59,999);
  if (filter === 'fds') {
    const { start, end } = getLastWeekendRange();
    return data.filter(r => {
      if (!r.dataInicio) return false;
      const d = new Date(r.dataInicio + 'T12:00:00');
      return d >= start && d <= end;
    });
  }
  if (filter === 'mes') {
    return data.filter(r => {
      if (!r.dataInicio) return false;
      const d = new Date(r.dataInicio + 'T12:00:00');
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    });
  }
  if (filter === 'ano') {
    return data.filter(r => {
      if (!r.dataInicio) return false;
      const d = new Date(r.dataInicio + 'T12:00:00');
      return d.getFullYear() === now.getFullYear();
    });
  }
  return data;
}

function getPeriodLabel(filter) {
  if (filter === 'fds') {
    const { start, end } = getLastWeekendRange();
    return `Final de semana · ${fmtDate(start)} – ${fmtDate(end)}`;
  }
  const now = new Date();
  if (filter === 'mes') return now.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  if (filter === 'ano') return `Ano ${now.getFullYear()}`;
  return 'Todos os registros';
}

/* ── Helpers ── */
function scoreColor(s) {
  if (s >= 90) return '#1D9E75';
  if (s >= 80) return '#378ADD';
  if (s >= 70) return '#BA7517';
  return '#D85A30';
}
function scoreClass(s) {
  if (s >= 90) return 'green';
  if (s >= 80) return 'blue';
  if (s >= 70) return 'orange';
  return 'red';
}
function fmt(n) { return (typeof n==='number'&&!isNaN(n)) ? n.toFixed(1) : '—'; }
function avg(arr, k) {
  const vals = arr.map(r=>parseFloat(r[k])).filter(v=>!isNaN(v));
  return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
}
function shortCurso(name, max=26) {
  const parts = (name||'').split(' - ');
  const title = parts.length>1 ? parts.slice(1).join(' - ') : name;
  return title.length>max ? title.substring(0,max)+'…' : title;
}
function shortProf(name) {
  const parts = (name||'').trim().split(' ');
  if (parts.length<=2) return name;
  return parts[0]+' '+parts[parts.length-1];
}

/* ── Render ── */
function destroyCharts() {
  Object.values(activeCharts).forEach(c=>{try{c.destroy()}catch(e){}});
  activeCharts = {};
}

function renderKPIs(data) {
  const mg=avg(data,'mediaGeral'), mp=avg(data,'mediaProfessor'), ms=avg(data,'mediaSuporteVal');
  const total=data.reduce((s,r)=>s+(parseInt(r.respondentes)||0),0);
  const ma=data.length?Math.round(total/data.length):0;
  return `<div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Média Geral</div><div class="kpi-value" style="color:${scoreColor(mg)}">${fmt(mg)}</div><div class="kpi-sub">${data.length} aulas avaliadas</div></div>
    <div class="kpi"><div class="kpi-label">Média Professores</div><div class="kpi-value" style="color:${scoreColor(mp)}">${fmt(mp)}</div><div class="kpi-sub">avaliação docente</div></div>
    <div class="kpi"><div class="kpi-label">Média Suporte</div><div class="kpi-value" style="color:${scoreColor(ms)}">${fmt(ms)}</div><div class="kpi-sub">staff de apoio</div></div>
    <div class="kpi"><div class="kpi-label">Total de Alunos</div><div class="kpi-value">${total}</div><div class="kpi-sub">~${ma} por aula</div></div>
  </div>`;
}

function renderRanking(title, items, key, asc=false, limit=5) {
  const sorted = [...items].sort((a,b)=>asc
    ?(parseFloat(a[key])||0)-(parseFloat(b[key])||0)
    :(parseFloat(b[key])||0)-(parseFloat(a[key])||0)
  ).slice(0,limit);
  const maxS = sorted.length?Math.max(...sorted.map(r=>parseFloat(r[key])||0)):100;
  const rows = sorted.map((r,i)=>{
    const s=parseFloat(r[key])||0;
    const pct=maxS>0?(s/maxS)*100:0;
    const name=r.curso?shortCurso(r.curso):shortProf(r.professor||'—');
    return `<div class="ranking-item">
      <span class="rank-num">${i+1}</span>
      <span class="rank-name" title="${r.curso||r.professor||''}">${name}</span>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%;background:${scoreColor(s)}"></div></div>
      <span class="rank-score ${scoreClass(s)}">${fmt(s)}</span>
    </div>`;
  }).join('');
  return `<div class="card"><div class="card-title">${title}</div><div class="ranking-list">${rows||'<div class="no-data">Sem dados</div>'}</div></div>`;
}

function buildCharts(data) {
  const sorted=[...data].sort((a,b)=>(parseFloat(b.mediaGeral)||0)-(parseFloat(a.mediaGeral)||0));
  const labelsC=sorted.map(r=>shortCurso(r.curso||'',22));
  const mgVals=sorted.map(r=>parseFloat(r.mediaGeral)||0);
  const mpVals=sorted.map(r=>parseFloat(r.mediaProfessor)||0);
  const msVals=sorted.map(r=>parseFloat(r.mediaSuporteVal)||0);

  const byProf={};
  data.forEach(r=>{
    const p=r.professor||'N/A';
    if(!byProf[p]) byProf[p]=[];
    byProf[p].push(parseFloat(r.mediaProfessor)||0);
  });
  const profEntries=Object.entries(byProf)
    .map(([k,v])=>({name:shortProf(k),score:v.reduce((a,b)=>a+b,0)/v.length}))
    .sort((a,b)=>b.score-a.score);

  const isDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor=isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.05)';
  const tickColor=isDark?'#6b6b66':'#9b9b94';

  const axisNum={min:60,max:100,grid:{color:gridColor},ticks:{color:tickColor,font:{size:10},callback:v=>v.toFixed(0)}};
  const axisCat=(h)=>({grid:{display:false},ticks:{color:tickColor,font:{size:10},maxRotation:h?0:38,autoSkip:false}});

  const makeOpts=(horizontal,multiSeries=false)=>({
    responsive:true,maintainAspectRatio:false,
    indexAxis:horizontal?'y':'x',
    plugins:{
      legend:{display:multiSeries,position:'top',labels:{color:tickColor,font:{size:11},boxWidth:10,boxHeight:10,borderRadius:2,useBorderRadius:true}},
      tooltip:{callbacks:{label:ctx=>` ${(horizontal?ctx.parsed.x:ctx.parsed.y).toFixed(1)}`}}
    },
    scales:horizontal?{x:axisNum,y:axisCat(true)}:{y:axisNum,x:axisCat(false)}
  });

  const h1=Math.max(180,sorted.length*28+50);
  const h2=Math.max(150,profEntries.length*28+50);

  setTimeout(()=>{
    const c1=document.getElementById('ch-geral');
    if(c1) activeCharts.geral=new Chart(c1,{type:'bar',data:{labels:labelsC,datasets:[{data:mgVals,backgroundColor:mgVals.map(scoreColor),borderRadius:4}]},options:makeOpts(true)});

    const c2=document.getElementById('ch-compare');
    if(c2) activeCharts.compare=new Chart(c2,{type:'bar',data:{labels:labelsC,datasets:[
      {label:'Professor',data:mpVals,backgroundColor:'rgba(55,138,221,.75)',borderRadius:3},
      {label:'Suporte',data:msVals,backgroundColor:'rgba(29,158,117,.55)',borderRadius:3}
    ]},options:{...makeOpts(false,true),plugins:{...makeOpts(false,true).plugins,tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}`}}}}});

    const c3=document.getElementById('ch-prof');
    if(c3) activeCharts.prof=new Chart(c3,{type:'bar',data:{labels:profEntries.map(p=>p.name),datasets:[{data:profEntries.map(p=>p.score),backgroundColor:profEntries.map(p=>scoreColor(p.score)),borderRadius:4}]},options:makeOpts(true)});
  },80);

  return {h1,h2};
}

function renderAll(data) {
  destroyCharts();
  if(!data.length){
    document.getElementById('main-content').innerHTML=`<div class="no-data" style="padding:60px">Nenhuma aula encontrada para este período.</div>`;
    return;
  }
  const byProf={};
  data.forEach(r=>{
    const p=r.professor||'N/A';
    if(!byProf[p]) byProf[p]=[];
    byProf[p].push(parseFloat(r.mediaProfessor)||0);
  });
  const profFlat=Object.entries(byProf).map(([k,v])=>({professor:k,mediaProfessor:v.reduce((a,b)=>a+b,0)/v.length}));
  const {h1,h2}=buildCharts(data);

  document.getElementById('main-content').innerHTML=`
    ${renderKPIs(data)}
    <div class="section-label">Desempenho por turma</div>
    <div class="card"><div class="card-title">Média geral por turma — escala 0–100</div><div style="position:relative;width:100%;height:${h1}px"><canvas id="ch-geral" role="img" aria-label="Médias gerais"></canvas></div></div>
    <div class="section-label">Professor vs Suporte</div>
    <div class="card"><div class="card-title">Comparativo por turma</div><div style="position:relative;width:100%;height:260px"><canvas id="ch-compare" role="img" aria-label="Professor vs Suporte"></canvas></div></div>
    <div class="section-label">Professores</div>
    <div class="card"><div class="card-title">Média por professor</div><div style="position:relative;width:100%;height:${h2}px"><canvas id="ch-prof" role="img" aria-label="Professores"></canvas></div></div>
    <div class="section-label">Rankings</div>
    <div class="two-col" style="margin-bottom:12px">
      ${renderRanking('🏆 Top 5 turmas',data,'mediaGeral',false,5)}
      ${renderRanking('⚠️ 5 piores turmas',data,'mediaGeral',true,5)}
    </div>
    <div style="margin-bottom:12px">
      ${renderRanking('📉 5 piores professores',profFlat,'mediaProfessor',true,5)}
    </div>`;

  buildCharts(data);
}

function setFilter(f,btn) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const filtered=getFilteredData(allData,f);
  document.getElementById('period-label').textContent=`${getPeriodLabel(f)} · ${filtered.length} aula(s)`;
  renderAll(filtered);
}

/* ── Fetch Notion via Claude API ── */
async function fetchNotion() {
  try {
    const resp=await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:8000,
        system:`Você consulta o banco Avaliações de Turmas no Notion e retorna APENAS JSON puro, sem markdown, sem explicações, sem blocos de código.
IMPORTANTE: As notas já estão na escala 0 a 100. NÃO multiplique nem altere os valores numéricos.
Formato exato:
{"records":[{"curso":"nome completo","professor":"nome completo","mediaGeral":96.1,"mediaProfessor":97.5,"mediaSuporteVal":95.0,"respondentes":20,"dataInicio":"2026-04-10"}]}
A data deve ser no formato YYYY-MM-DD (use o campo start da Data Início / Data Fim).`,
        messages:[{role:'user',content:`Consulte o banco de dados Notion "Avaliações de Turmas" (ID: ${NOTION_DB_ID}) e retorne TODOS os registros. Campos: Curso, Professor, Média Geral, Média Professor, Média Suporte, Respondentes, Data Início / Data Fim. NÃO altere os valores. Retorne apenas o JSON.`}],
        mcp_servers:[{type:'url',url:'https://mcp.notion.com/mcp',name:'notion-mcp'}]
      })
    });
    const d=await resp.json();
    const textBlock=d.content&&d.content.find(b=>b.type==='text');
    if(!textBlock) return null;
    let text=textBlock.text.trim().replace(/^```(?:json)?\s*/,'').replace(/\s*```$/,'').trim();
    const match=text.match(/\{[\s\S]*\}/);
    if(!match) return null;
    const json=JSON.parse(match[0]);
    return Array.isArray(json.records)&&json.records.length>0?json.records:null;
  } catch(e){
    console.warn('Erro Notion:',e);
    return null;
  }
}

async function init() {
  const raw = await fetchNotion();
  allData = raw || FALLBACK_DATA;

  if (!raw) console.info('Usando dados de fallback.');

  const filtered = getFilteredData(allData,'fds');
  const label = getPeriodLabel('fds');

  if (!filtered.length && allData.length) {
    // FDS atual sem dados → mostra todos e muda botão ativo
    document.getElementById('period-label').textContent=`Todos os registros · ${allData.length} aula(s)${!raw?' · cache local':''}`;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector('[data-filter="todos"]').classList.add('active');
    renderAll(allData);
  } else {
    document.getElementById('period-label').textContent=`${label} · ${filtered.length} aula(s)${!raw?' · cache local':''}`;
    renderAll(filtered);
  }
}

init();
